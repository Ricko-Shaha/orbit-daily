<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>ORBIT — daily one-button game</title>
<!-- Standalone preview: loads Phaser from CDN so you can just open this file and play.
     The Devvit build (src/client) bundles Phaser instead. Game logic is identical to
     src/shared/* (inlined here to keep this file self-contained). -->
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<style>
  html,body{margin:0;height:100%;background:#06070d;overflow:hidden;font-family:ui-monospace,Menlo,Consolas,monospace}
  #wrap{display:flex;align-items:center;justify-content:center;height:100%}
  canvas{border-radius:14px;box-shadow:0 0 60px #1a2a6b55}
</style>
</head>
<body>
<div id="wrap"><div id="game"></div></div>
<script>
// ---- shared logic (mirror of src/shared) ----
function mulberry32(seed){let a=seed>>>0;return function(){a|=0;a=(a+0x6d2b79f5)|0;let t=Math.imul(a^(a>>>15),1|a);t=(t+Math.imul(t^(t>>>7),61|t))^t;return ((t^(t>>>14))>>>0)/4294967296;};}
function hashStr(s){let h=2166136261>>>0;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function dailySeed(d){return hashStr("orbit:v1:"+d);}
function todayUTC(){return new Date().toISOString().slice(0,10);}
function buildLevel(seed,durationS=120,baseSpeed=150){const rnd=mulberry32(seed);const hz=[];let t=1.5;while(t<durationS){const angle=rnd()*Math.PI*2;const speed=baseSpeed+rnd()*70+t*1.4;hz.push({t,angle,speed});const gap=Math.max(0.4,1.6-t*0.013-rnd()*0.35);t+=gap;}return hz;}
const TAU=Math.PI*2;
function normAngle(a){a%=TAU;return a<0?a+TAU:a;}
function angularGap(a,b){const d=Math.abs(normAngle(a)-normAngle(b));return Math.min(d,TAU-d);}
function scoreFor(s,d){return Math.max(0,Math.round(s*10)+d*5);}

// ---- config ----
const W=420,H=560,CX=W/2,CY=H/2,R=120,HITARC=0.34,PLR=9,HZR=9,START=Math.hypot(W,H)/2+30,OMEGA=2.3;
const DATE=todayUTC(), SEED=dailySeed(DATE);
const KEY="orbit_best_"+DATE;

class Game extends Phaser.Scene{
  create(){
    this.g=this.add.graphics();
    this.title=this.add.text(CX,CY-150,"ORBIT",{fontFamily:"monospace",fontSize:"46px",color:"#7fd1ff"}).setOrigin(.5).setShadow(0,0,"#2a6bff",18,true,true);
    this.sub=this.add.text(CX,CY-105,"tap / space to reverse",{fontFamily:"monospace",fontSize:"14px",color:"#9aa6c0"}).setOrigin(.5);
    this.hud=this.add.text(10,8,"",{fontFamily:"monospace",fontSize:"14px",color:"#cdd6ee"});
    this.daily=this.add.text(W-10,8,"daily board "+DATE,{fontFamily:"monospace",fontSize:"11px",color:"#5f6b88"}).setOrigin(1,0);
    this.center=this.add.text(CX,CY,"",{fontFamily:"monospace",fontSize:"15px",color:"#e9eefc",align:"center"}).setOrigin(.5);
    this.reset(true);
    this.input.keyboard.on("keydown-SPACE",()=>this.act());
    this.input.on("pointerdown",()=>this.act());
  }
  reset(first){
    this.state=first?"title":"ready";
    this.theta=-Math.PI/2; this.dir=1; this.t=0; this.dodged=0; this.score=0;
    this.haz=buildLevel(SEED).map(h=>({...h,done:false}));
    this.best=Number(localStorage.getItem(KEY)||0);
    this.shake=0;
    this.center.setText(first?"":"tap to start\n\nbest today: "+this.best);
    this.title.setVisible(true); this.sub.setVisible(true);
  }
  act(){
    if(this.state==="title"||this.state==="ready"||this.state==="dead"){
      this.title.setVisible(false); this.sub.setVisible(false); this.center.setText("");
      if(this.state==="dead") this.reset(false);
      this.state="play"; return;
    }
    if(this.state==="play") this.dir*=-1;
  }
  gameOver(){
    this.state="dead"; this.shake=14;
    if(this.score>this.best){ this.best=this.score; localStorage.setItem(KEY,String(this.score)); }
    this.center.setText("CRASH\nscore "+this.score+"\nbest today "+this.best+"\n\ntap to retry");
    // burst
    for(let i=0;i<22;i++) this.burst.push({x:CX+R*Math.cos(this.theta),y:CY+R*Math.sin(this.theta),a:Math.random()*TAU,sp:60+Math.random()*160,life:1});
  }
  burst=[];
  update(_,dms){
    const dt=Math.min(0.05,dms/1000);
    if(this.state==="play"){
      this.t+=dt; this.theta=normAngle(this.theta+this.dir*OMEGA*dt);
      this.score=scoreFor(this.t,this.dodged);
      for(const h of this.haz){
        if(h.done||this.t<h.t) continue;
        const dist=START-h.speed*(this.t-h.t);
        if(dist<=R){
          if(angularGap(this.theta,h.angle)<HITARC){ this.gameOver(); break; }
          else { h.done=true; this.dodged++; for(let i=0;i<6;i++) this.burst.push({x:CX+R*Math.cos(h.angle),y:CY+R*Math.sin(h.angle),a:h.angle+(Math.random()-.5),sp:40+Math.random()*70,life:.6}); }
        }
      }
    }
    this.hud.setText("score "+this.score+"   time "+this.t.toFixed(1)+"s   dodged "+this.dodged);
    // render
    const g=this.g; g.clear();
    const ox=this.shake?(Math.random()-.5)*this.shake:0, oy=this.shake?(Math.random()-.5)*this.shake:0;
    this.shake=Math.max(0,this.shake-0.6);
    // ring
    g.lineStyle(2,0x223,0.0); g.lineStyle(2,0x2a3566,1); g.strokeCircle(CX+ox,CY+oy,R);
    // sun
    g.fillStyle(0x2a6bff,0.18); g.fillCircle(CX+ox,CY+oy,30);
    g.fillStyle(0x7fd1ff,1); g.fillCircle(CX+ox,CY+oy,11);
    // hazards
    for(const h of this.haz){ if(h.done||this.t<h.t) continue; const dist=START-h.speed*(this.t-h.t); if(dist<R-14||dist>START+5) continue;
      const x=CX+dist*Math.cos(h.angle)+ox,y=CY+dist*Math.sin(h.angle)+oy;
      g.fillStyle(0xff6b6b,1); g.fillCircle(x,y,HZR);
      g.lineStyle(2,0xff6b6b,0.25); g.lineBetween(x,y,CX+R*Math.cos(h.angle)+ox,CY+R*Math.sin(h.angle)+oy);
    }
    // player
    const px=CX+R*Math.cos(this.theta)+ox,py=CY+R*Math.sin(this.theta)+oy;
    g.fillStyle(0x6effa6,0.25); g.fillCircle(px,py,PLR+6);
    g.fillStyle(0x6effa6,1); g.fillCircle(px,py,PLR);
    // particles
    for(const p of this.burst){ p.life-=dt*1.6; if(p.life<=0)continue; p.x+=Math.cos(p.a)*p.sp*dt; p.y+=Math.sin(p.a)*p.sp*dt; g.fillStyle(0xffd36b,Math.max(0,p.life)); g.fillCircle(p.x+ox,p.y+oy,3);}
    this.burst=this.burst.filter(p=>p.life>0);
  }
}
new Phaser.Game({type:Phaser.AUTO,width:W,height:H,parent:"game",backgroundColor:"#06070d",scene:Game,scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH}});
</script>
</body>
</html>
